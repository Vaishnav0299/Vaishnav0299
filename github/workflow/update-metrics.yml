name: Automated Telemetry Pipeline Cache Updates

on:
  schedule:
    # Trigger execution every 6 hours automatically
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual pipeline execution override in the Actions tab

permissions:
  contents: write

jobs:
  cache-telemetry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Initialize Local Storage Directory Tree
        run: mkdir -p data

      - name: Execute GitHub API Aggregation Pipeline
        run: |
          echo "Ingesting core profile statistics parameters..."
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/users/vaishnavgaware" > data/profile.json

          echo "Ingesting repository metadata matrices..."
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/users/vaishnavgaware/repos?sort=updated&per_page=30" > data/repos.json

          echo "Compiling structural local distribution tables..."
          # Combines profiles and repositories together safely inside an asset structure
          echo "{\"profile\": $(cat data/profile.json), \"repos\": $(cat data/repos.json), \"compiledAt\": $(date +%s)}" > data/telemetry.json

          # Clean up temporary layout pieces
          rm data/profile.json
          rm data/repos.json

      - name: Commit and Push Updated Data Cache
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/telemetry.json
          
          # Check if changes exist before trying to make a commit
          if git diff --staged --quiet; then
            echo "No variations detected in metrics engine telemetry. Skipping synchronization."
          else
            git commit -m "chore: automated telemetry pipeline synchronized [skip ci]"
            git push
          fi
